name: First Pipeline
on: 
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: mv node_modules dist/
      - run: cp package.json dist/
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist
  test:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: test-coverage
          path: coverage
  code_quality:
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm run lint
  
          
      
      
          
